name: Bump Spacebot

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bump-spacebot
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Bump pinned Spacebot version
        run: bash .github/scripts/bump-spacebot.sh

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          new_version="$(sed -n -E "s/^version: '([^']+)'$/\1/p" spacebot/config.yaml)"

          if [[ -z "$new_version" ]]; then
            echo "Failed to read updated version from spacebot/config.yaml" >&2
            exit 1
          fi

          git add spacebot/build.yaml spacebot/config.yaml spacebot/CHANGELOG.md
          git commit -m "chore(spacebot): bump upstream to ${new_version}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
