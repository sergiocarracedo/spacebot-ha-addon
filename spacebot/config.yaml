# https://developers.home-assistant.io/docs/apps/configuration
name: Spacebot
version: "v0.3.15"
slug: spacebot
description: >-
  AI agent for teams, communities, and multi-user environments.
  Thinks, executes, and responds — concurrently, not sequentially.
url: https://github.com/sergiocarracedo/spacebot-ha-addon/tree/main/spacebot
arch:
  - aarch64
  - amd64

# Do not use HA's init — Spacebot manages its own processes
init: false

# Spacebot's workers use bubblewrap (bwrap) for sandboxing, which requires
# Linux user namespaces. These are blocked in unprivileged containers, causing
# "bwrap: Creating new namespace failed: Operation not permitted".
# SYS_ADMIN grants the capability to create new namespaces, enabling bwrap.
privileged:
  - SYS_ADMIN

# Start before HA core so integrations can reach it
startup: services

# --- Web UI / Ingress ---
# Spacebot's web panel runs on 19898; ingress proxies it through HA sidebar.
# ingress_stream enables WebSocket support (used by Spacebot's live UI).
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot
panel_title: Spacebot

# --- Filesystem mounts ---
# /share is the HA shared storage directory, visible at /share on the host
# and from the File Editor / Studio Code Server addons.
# Spacebot stores all its data under /share/spacebot (set via SPACEBOT_DIR).
map:
  - share:rw

# --- Backups ---
# HA includes /share in full backups automatically.
# We exclude regenerable large files to keep backup sizes reasonable.
backup: cold
backup_exclude:
  - share/spacebot/tools/bin/chrome*
  - share/spacebot/tools/bin/.chrome*
  - share/spacebot/chrome-data/**
  - share/spacebot/.cache/**

options: {}
schema: {}
