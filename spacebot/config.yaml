# https://developers.home-assistant.io/docs/apps/configuration
name: Spacebot
version: "v0.3.3"
slug: spacebot
description: >-
  AI agent for teams, communities, and multi-user environments.
  Thinks, executes, and responds — concurrently, not sequentially.
url: https://github.com/sergiocarracedo/spacebot-addon/tree/main/spacebot
arch:
  - aarch64
  - amd64

# Do not use HA's init — Spacebot manages its own processes
init: false

# Start before HA core so integrations can reach it
startup: services

# --- Web UI / Ingress ---
# Spacebot's web panel runs on 19898; ingress proxies it through HA sidebar.
# ingress_stream enables WebSocket support (used by Spacebot's live UI).
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot
panel_title: Spacebot

# Direct port access (disabled by default; user can map it in the app config UI).
# Useful if the HA ingress path causes UI issues with absolute asset paths.
ports:
  19898/tcp: null
ports_description:
  19898/tcp: Spacebot web control panel (direct access, optional)

# --- Persistent data ---
# /data is automatically included in HA backups.
# SPACEBOT_DIR is set to /data in run.sh, matching this mount.
# We exclude regenerable large files to keep backup sizes reasonable.
backup: cold
backup_exclude:
  - tools/bin/chrome*
  - tools/bin/.chrome*
  - chrome-data/**
  - .cache/**

options: {}
schema: {}
