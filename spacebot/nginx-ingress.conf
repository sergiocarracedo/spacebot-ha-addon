server {
    listen 8099 default_server;

    # Only allow HA Ingress proxy — deny all direct external access
    allow  172.30.32.2;
    deny   all;

    # WebSocket upgrade support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout  86400s;
    proxy_send_timeout  86400s;
    proxy_redirect      off;

    # Spacebot reads window.__SPACEBOT_BASE_PATH to prefix all API calls and
    # asset URLs. We inject it into the HTML using the X-Ingress-Path header
    # that HA Ingress sends on every request.
    sub_filter_once off;
    sub_filter_types text/html;

    # Inject the base path script tag before </head>
    sub_filter '</head>' '<script>window.__SPACEBOT_BASE_PATH="$http_x_ingress_path";</script></head>';

    # Also rewrite static asset hrefs/srcs that are absolute in the HTML
    sub_filter 'src="/assets/'  'src="$http_x_ingress_path/assets/';
    sub_filter 'href="/assets/' 'href="$http_x_ingress_path/assets/';
    sub_filter 'href="/favicon' 'href="$http_x_ingress_path/favicon';

    # ttyd web terminal — proxied at /terminal/
    # ttyd requires WebSocket support (same headers as main proxy).
    location /terminal/ {
        proxy_pass http://127.0.0.1:7681/terminal/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:19898;
    }
}
